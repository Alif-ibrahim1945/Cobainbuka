<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>System</title>

<!-- biar kayak app -->
<meta name="theme-color" content="#0f172a">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  background:#0f172a;
  color:white;
}

/* SAFE AREA (HP NOTCH) */
.app {
  padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
}

/* HEADER */
.header {
  font-size:18px;
  font-weight:600;
  padding:10px 0;
}

/* CARD MENU */
.card {
  background:#1e293b;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
  transition:0.15s;
}

/* efek ditekan */
.card:active {
  transform:scale(0.97);
  background:#334155;
}

/* LOADING */
.loading {
  margin-top:20px;
  display:none;
}

.status {
  font-size:13px;
  opacity:0.7;
  margin-bottom:8px;
}

.bar {
  height:5px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
}

.progress {
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.25s;
}

/* RESULT */
.result {
  display:none;
  text-align:center;
  margin-top:30px;
}

img {
  width:180px;
  border-radius:12px;
  opacity:0;
  transform:scale(0.8);
  transition:0.4s;
}

img.show {
  opacity:1;
  transform:scale(1);
}

.text {
  margin-top:10px;
  color:#ef4444;
  font-size:15px;
  opacity:0;
  transition:0.4s;
}

.text.show {
  opacity:1;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">System Center</div>

  <div class="card" onclick="start()">Cek Informasi Perangkat</div>
  <div class="card">Status Sistem</div>
  <div class="card">Pengaturan</div>

  <div class="loading" id="loading">
    <div class="status" id="status">Menghubungkan...</div>
    <div class="bar">
      <div class="progress" id="bar"></div>
    </div>
  </div>

  <div class="result" id="result">
    <img id="monyet" src="monyed.webp"">
    <div class="text" id="text">WKWKWK KENA PRANK 🐒</div>
  </div>

</div>

<audio id="sound"></audio>

<script>
let bar = document.getElementById("bar");
let status = document.getElementById("status");
let loading = document.getElementById("loading");
let result = document.getElementById("result");
let img = document.getElementById("monyet");
let text = document.getElementById("text");
let sound = document.getElementById("sound");

function start(){

  // request fullscreen (biar kayak app)
  document.documentElement.requestFullscreen?.();

  loading.style.display = "block";

  let progress = 0;

  let interval = setInterval(()=>{
    progress += Math.random()*7;
    bar.style.width = progress + "%";

    if(progress > 20) status.innerHTML="Mengambil data perangkat...";
    if(progress > 50) status.innerHTML="Memproses...";
    if(progress > 80) status.innerHTML="Finalisasi...";

    if(progress >= 100){
      clearInterval(interval);
      showResult();
    }

  },300);
}

function showResult(){
  loading.style.display = "none";
  result.style.display = "block";

  setTimeout(()=>{
    img.classList.add("show");
    text.classList.add("show");

    sound.src="https://www.myinstants.com/media/sounds/evil-laugh.mp3";
    sound.play();
  },300);
}
</script>

</body>
</html>
